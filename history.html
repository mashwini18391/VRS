<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="View your repair history.">
  <meta name="theme-color" content="#06060b">
  <title>Repair History — VRS</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/responsive.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <!-- Desktop Nav -->
  <nav class="desktop-nav">
    <div class="desktop-nav-logo">⚡ VRS</div>
    <div class="desktop-nav-links">
      <a href="dashboard.html">Dashboard</a>
      <a href="map.html">Map</a>
      <a href="history.html" class="active">History</a>
      <a href="ai-diagnosis.html">AI Assist</a>
      <a href="profile.html">Profile</a>
    </div>
  </nav>

  <div class="page-container animate-fadeIn">
    <!-- Header -->
    <div class="page-header">
      <h1 class="page-title">Repair History</h1>
    </div>

    <!-- Filter Tabs -->
    <div class="flex gap-sm mb-lg" style="overflow-x:auto;">
      <button class="btn btn-sm btn-primary" onclick="filterHistory('all', this)" data-filter="all">All</button>
      <button class="btn btn-sm btn-outline" onclick="filterHistory('completed', this)" data-filter="completed">Completed</button>
      <button class="btn btn-sm btn-outline" onclick="filterHistory('cancelled', this)" data-filter="cancelled">Cancelled</button>
      <button class="btn btn-sm btn-outline" onclick="filterHistory('pending', this)" data-filter="pending">Pending</button>
    </div>

    <!-- History Cards -->
    <div id="historyList" class="stagger-children">
      <!-- Populated by JS -->
    </div>

    <!-- Empty State -->
    <div id="emptyHistory" class="empty-state hidden">
      <div class="empty-state-icon">📋</div>
      <div class="empty-state-title">No Repairs Yet</div>
      <p class="empty-state-text">Your completed repairs will be listed here.</p>
      <a href="map.html" class="btn btn-primary">Find a Mechanic</a>
    </div>
  </div>

  <!-- Floating Emergency Button -->
  <button class="fab-emergency" onclick="window.location.href='booking.html?emergency=true'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
      <line x1="12" y1="9" x2="12" y2="13"/>
      <line x1="12" y1="17" x2="12.01" y2="17"/>
    </svg>
  </button>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <a href="dashboard.html" class="nav-item"><span class="nav-icon">🏠</span><span class="nav-label">Home</span></a>
    <a href="map.html" class="nav-item"><span class="nav-icon">🗺️</span><span class="nav-label">Map</span></a>
    <a href="ai-diagnosis.html" class="nav-item"><span class="nav-icon">🤖</span><span class="nav-label">AI</span></a>
    <a href="history.html" class="nav-item active"><span class="nav-icon">📋</span><span class="nav-label">History</span></a>
    <a href="profile.html" class="nav-item"><span class="nav-icon">👤</span><span class="nav-label">Profile</span></a>
  </nav>

  <div class="toast-container" id="toastContainer"></div>

  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/history.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await requireAuth();
      loadHistory();
    });
  </script>
</body>
</html>
