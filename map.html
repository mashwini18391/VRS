<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Find nearby mechanics on the map.">
  <meta name="theme-color" content="#06060b">
  <title>Find Mechanics — VRS</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      overflow: hidden;
    }

    .leaflet-container {
      background: var(--bg-primary);
    }

    .leaflet-popup-content-wrapper {
      background: var(--bg-surface);
      color: var(--text-primary);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--border-default);
    }

    .leaflet-popup-tip {
      background: var(--bg-surface);
    }

    .leaflet-popup-content {
      margin: 12px 16px;
      font-family: var(--font-family);
    }

    .leaflet-control-zoom a {
      background: var(--bg-surface) !important;
      color: var(--text-primary) !important;
      border-color: var(--border-default) !important;
    }

    .user-marker {
      width: 20px;
      height: 20px;
      background: var(--emergency-blue);
      border: 3px solid #fff;
      border-radius: 50%;
      box-shadow: 0 0 15px var(--emergency-blue-glow);
      position: relative;
    }

    .user-marker::after {
      content: '';
      position: absolute;
      inset: -8px;
      border: 2px solid var(--emergency-blue);
      border-radius: 50%;
      animation: radarSweep 2s ease-out infinite;
    }

    .mechanic-marker {
      width: 36px;
      height: 36px;
      background: var(--bg-surface);
      border: 2px solid var(--emergency-red);
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      box-shadow: var(--shadow-md);
    }
  </style>
</head>

<body>
  <div class="map-container">
    <!-- Search Bar Overlay -->
    <div class="map-overlay-top animate-slideDown car-owner-only">
      <div class="map-search">
        <span>🔍</span>
        <input type="text" placeholder="Search location or mechanic..." id="mapSearchInput">
        <button class="btn-icon btn-ghost" onclick="recenterMap()" title="My Location"
          style="font-size:1.2rem;">📍</button>
      </div>
    </div>

    <!-- Map -->
    <div id="map"></div>

    <!-- Bottom Sheet (Car Owner) -->
    <div class="map-bottom-sheet car-owner-only" id="mechanicsSheet">
      <div class="sheet-header" onclick="toggleSheet()">
        <div>
          <div class="modal-handle" style="margin:0 0 8px 0;"></div>
          <span class="sheet-title">Nearby Mechanics (<span id="mechanicCount">0</span>)</span>
        </div>
        <span class="badge badge-active" id="sortBadge">By Distance</span>
      </div>
      <div class="sheet-body" id="mechanicsList">
        <!-- Populated by JS -->
      </div>
    </div>

    <!-- Bottom Sheet (Garage Owner) -->
    <div class="map-bottom-sheet garage-only" id="customerRequestsSheet">
      <div class="sheet-header">
        <div>
          <div class="modal-handle" style="margin:0 0 8px 0;"></div>
          <span class="sheet-title">Nearby Customer Requests (<span id="customerCount">0</span>)</span>
        </div>
        <span class="badge badge-emergency">Live Updates</span>
      </div>
      <div class="sheet-body" id="customerRequestsList" style="padding: 16px; text-align: center; color: var(--text-muted);">
        No nearby customer requests found.
      </div>
    </div>
  </div>

  <!-- Floating Emergency Button -->
  <button class="fab-emergency car-owner-only" onclick="window.location.href='booking.html?emergency=true'" style="bottom:20px;">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
      stroke-linejoin="round">
      <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z" />
      <line x1="12" y1="9" x2="12" y2="13" />
      <line x1="12" y1="17" x2="12.01" y2="17" />
    </svg>
  </button>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/map.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await requireAuth();
      initMap();
    });
  </script>
</body>

</html>
