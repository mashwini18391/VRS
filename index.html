  <script>
    // Handle OAuth redirect callback + check if already logged in
    document.addEventListener('DOMContentLoaded', async () => {
      let redirecting = false;

      // Listen for auth state changes (handles Google OAuth redirect)
      onAuthStateChange((event, user) => {
        if (event === 'SIGNED_IN' && user && !redirecting) {
          redirecting = true;
          showToast(`Welcome, ${user.user_metadata?.full_name || user.email}!`, 'success');
          setTimeout(() => {
            window.location.href = 'dashboard.html';
          }, 800);
        }
      });

      // Regular check for already logged in users
      const user = await getCurrentUser();
      if (user && !redirecting) {
        window.location.href = 'dashboard.html';
      }
    });
  </script>
